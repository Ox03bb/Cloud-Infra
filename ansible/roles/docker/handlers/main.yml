---
# handlers file for docker

- name: Restart Docker
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: Start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Stop Docker
  ansible.builtin.systemd:
    name: docker
    state: stopped